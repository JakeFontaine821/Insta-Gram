<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta-Gram</title>

    <script type="module" src="./components/SenderRootPage.js"></script>
    <script type="module" src="./components/AlbumManagerPage.js"></script>
</head>
<body>
    <sender-root-page></sender-root-page>
    <album-manager-page></album-manager-page>

    <script>
        const rootPage = document.querySelector('sender-root-page');
        const albumManagerPage = document.querySelector('album-manager-page');

        rootPage.addEventListener('createalbum', () => {
            rootPage.classList.add('hidden');
            albumManagerPage.classList.remove('hidden');
        });

        albumManagerPage.addEventListener('close', () => {
            rootPage.classList.remove('hidden');
            albumManagerPage.classList.add('hidden');
        });

        // Handle Server events
        const eventSource = new EventSource('/events');
        eventSource.onerror = (err) => console.error('SSE error:', err);;

        eventSource.onmessage = (event) => {
            console.log('Received:', JSON.parse(event.data));
        };

        eventSource.addEventListener('albumreload', () => {
            rootPage.loadAlbums();
            albumManagerPage.loadAlbums();
        });

        eventSource.addEventListener('albumcount', ({data}) => {
            const albumData = JSON.parse(data);
            const albumEntries = document.querySelectorAll(`.${albumData.albumId}`);
            for(const entry of albumEntries){ entry.updateCount(albumData.count); }
        });

        // albumManagerPage.addEventListener('update', () => rootPage.loadAlbums());
    </script>
</body>
</html>
